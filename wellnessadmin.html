<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Wellness Submissions | Vaishali Ashish Modi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--deep:#2D0A31;--purple:#5B1A6B;--rose:#B8365A;--gold:#C9932A;--gold-light:#E8C96A;--cream:#FFFAF8;--card:rgba(255,255,255,0.96);--border:#E0D0D8;--text:#1A1A1A;--muted:#6B5060}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* LOGIN */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--deep) 0%,var(--purple) 55%,#3D1245 100%);padding:2rem}
#loginPage::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 15% 85%,rgba(201,147,42,.08) 0%,transparent 50%),radial-gradient(ellipse at 85% 15%,rgba(184,54,90,.07) 0%,transparent 50%)}
.login-box{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(201,147,42,.2);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;text-align:center;position:relative;z-index:1;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.login-logo{width:72px;height:72px;border-radius:50%;border:2px solid var(--gold);margin:0 auto 1.5rem;background:rgba(91,26,107,.5);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(201,147,42,.2)}
.login-logo svg{width:38px;height:38px}
.login-brand{font-family:'Playfair Display',serif;color:#fff;font-size:1.6rem;font-weight:700;margin-bottom:.15rem}
.login-brand span{color:var(--gold-light);font-style:italic;font-weight:400}
.login-sub{color:var(--gold);font-size:.72rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:2rem}
.login-label{display:block;text-align:left;color:rgba(255,255,255,.6);font-size:.78rem;font-weight:600;letter-spacing:.5px;margin-bottom:.4rem}
.login-input{width:100%;padding:.8rem 1.1rem;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .25s;margin-bottom:1.2rem}
.login-input:focus{border-color:var(--gold)}
.login-input::placeholder{color:rgba(255,255,255,.3)}
.login-btn{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--deep);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(201,147,42,.35)}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,147,42,.5)}
.login-error{color:#FF6B6B;font-size:.82rem;margin-top:.8rem;display:none;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ADMIN */
#adminPage{display:none;min-height:100vh}
.topbar{background:linear-gradient(135deg,var(--deep),var(--purple));padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.2);position:sticky;top:0;z-index:50}
.topbar-brand{font-family:'Playfair Display',serif;color:#fff;font-size:1.1rem}
.topbar-brand span{color:var(--gold-light);font-style:italic}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-badge{background:rgba(201,147,42,.15);border:1px solid rgba(201,147,42,.3);color:var(--gold-light);font-size:.72rem;font-weight:600;padding:.3rem .8rem;border-radius:20px;letter-spacing:1px;text-transform:uppercase}
.logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:.35rem .9rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s}
.logout-btn:hover{background:rgba(255,255,255,.15);color:#fff}

.admin-body{padding:1.5rem;max-width:1100px;margin:0 auto}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
@media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem 1.4rem;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(45,10,49,.06)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--rose))}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--deep);line-height:1}
.stat-label{font-size:.75rem;color:var(--muted);font-weight:500;margin-top:.25rem;text-transform:uppercase;letter-spacing:.5px}
.stat-icon{position:absolute;right:1.2rem;top:50%;transform:translateY(-50%);font-size:1.8rem;opacity:.15}

/* CONTROLS */
.controls{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.2rem;margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;box-shadow:0 2px 12px rgba(45,10,49,.06)}
.search-input{flex:1;min-width:200px;padding:.6rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;background:#fff}
.search-input:focus{border-color:var(--rose)}
.filter-select{padding:.6rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;cursor:pointer;background:#fff;color:var(--text)}
.export-btn{padding:.6rem 1.2rem;background:linear-gradient(135deg,var(--deep),var(--purple));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 3px 12px rgba(45,10,49,.2);white-space:nowrap}
.export-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(45,10,49,.3)}
.refresh-btn{padding:.6rem 1rem;background:rgba(91,26,107,.08);color:var(--purple);border:1.5px solid rgba(91,26,107,.2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.refresh-btn:hover{background:rgba(91,26,107,.15)}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(45,10,49,.06)}
.table-head{background:linear-gradient(135deg,var(--deep),var(--purple));display:grid;grid-template-columns:2fr 1.2fr 1fr 1.4fr 1fr 60px;padding:.75rem 1.2rem;gap:.5rem}
@media(max-width:750px){.table-head{display:none}}
.th{color:rgba(255,255,255,.7);font-size:.72rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.submission-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1.4fr 1fr 60px;padding:.85rem 1.2rem;gap:.5rem;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.submission-row:last-child{border-bottom:none}
.submission-row:hover{background:rgba(91,26,107,.04)}
@media(max-width:750px){.submission-row{grid-template-columns:1fr;gap:.25rem;padding:1rem 1.2rem}}
.td{font-size:.85rem;color:var(--text)}
.td-name{font-weight:600;color:var(--deep)}
.td-label{display:none;font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase}
@media(max-width:750px){.td-label{display:inline;margin-right:.4rem}}
.goal-pill{display:inline-block;padding:.2rem .7rem;background:rgba(91,26,107,.1);color:var(--purple);border-radius:20px;font-size:.75rem;font-weight:600}
.view-btn{padding:.3rem .7rem;background:linear-gradient(135deg,var(--rose),var(--purple));color:#fff;border:none;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(184,54,90,.25)}
.view-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,54,90,.4)}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.4}
.loading-state{text-align:center;padding:3rem;color:var(--muted)}
.spinner{display:inline-block;width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--purple);animation:spin .7s linear infinite;margin-bottom:.8rem}
@keyframes spin{to{transform:rotate(360deg)}}
.results-count{font-size:.8rem;color:var(--muted);padding:.5rem 1.2rem;border-top:1px solid var(--border)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(45,10,49,.6);backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding:1.5rem;overflow-y:auto}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--cream);border-radius:20px;width:100%;max-width:700px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:slideUp .25s ease;margin:auto}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{background:linear-gradient(135deg,var(--deep),var(--purple));padding:1.5rem 1.8rem;display:flex;align-items:center;justify-content:space-between}
.modal-name{font-family:'Playfair Display',serif;color:#fff;font-size:1.3rem}
.modal-meta{color:rgba(255,255,255,.55);font-size:.78rem;margin-top:.15rem}
.modal-close{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:background .2s;flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:1.5rem 1.8rem}
.modal-section{margin-bottom:1.5rem}
.modal-section-title{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--rose);border-bottom:1.5px solid var(--border);padding-bottom:.4rem;margin-bottom:.8rem}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .8rem}
@media(max-width:500px){.modal-grid{grid-template-columns:1fr}}
.modal-field-label{font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:.1rem}
.modal-field-value{font-size:.88rem;color:var(--text);font-weight:500;word-break:break-word}
.modal-field-value.empty{color:#bbb;font-style:italic;font-size:.82rem}
.wa-section{background:rgba(37,211,102,.05);border:1px solid rgba(37,211,102,.15);border-radius:10px;padding:1rem;margin-bottom:1.2rem}
.whatsapp-link{display:inline-flex;align-items:center;gap:.4rem;background:#25D366;color:#fff;padding:.45rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(37,211,102,.3)}
.whatsapp-link:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,211,102,.45)}
.whatsapp-link svg{width:16px;height:16px;fill:#fff}

/* PAGINATION */
.pagination{display:flex;justify-content:center;align-items:center;gap:.5rem;padding:1rem}
.page-btn{padding:.4rem .85rem;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.page-btn:hover{border-color:var(--purple);color:var(--purple)}
.page-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="32" r="16" fill="none" stroke="#C9932A" stroke-width="2"/>
        <path d="M50 48 C32 48 22 64 22 78 L78 78 C78 64 68 48 50 48Z" fill="none" stroke="#C9932A" stroke-width="2"/>
        <path d="M36 28 Q50 12 64 28" fill="none" stroke="#E8C96A" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="login-brand">Vaishali <span>Ashish Modi</span></div>
    <div class="login-sub">Admin Dashboard</div>
    <label class="login-label">PASSWORD</label>
    <input class="login-input" type="password" id="pwInput" placeholder="Enter your admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ENTER DASHBOARD</button>
    <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPage">
  <div class="topbar">
    <div class="topbar-brand">Vaishali <span>Ashish Modi</span> &nbsp;·&nbsp; Wellness Admin</div>
    <div class="topbar-right">
      <div class="topbar-badge">Admin</div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total Submissions</div><div class="stat-icon">📋</div></div>
      <div class="stat-card"><div class="stat-num" id="statToday">—</div><div class="stat-label">Today</div><div class="stat-icon">📅</div></div>
      <div class="stat-card"><div class="stat-num" id="statWeek">—</div><div class="stat-label">This Week</div><div class="stat-icon">📈</div></div>
      <div class="stat-card"><div class="stat-num" id="statGoal">—</div><div class="stat-label">Top Goal</div><div class="stat-icon">🎯</div></div>
    </div>
    <div class="controls">
      <input class="search-input" type="text" id="searchInput" placeholder="🔍  Search by name, city, email..." oninput="applyFilters()">
      <select class="filter-select" id="goalFilter" onchange="applyFilters()">
        <option value="">All Goals</option>
        <option>Fat Loss</option><option>Muscle Gain</option><option>Gut Healing</option>
        <option>Hormone Balancing</option><option>Longevity</option><option>Other</option>
      </select>
      <select class="filter-select" id="dietFilter" onchange="applyFilters()">
        <option value="">All Diet Types</option>
        <option value="Veg">Vegetarian</option><option value="Non-Veg">Non-Veg</option><option value="Both">Both</option>
      </select>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <div class="th">Name &amp; Contact</div>
        <div class="th">City · Age</div>
        <div class="th">Diet</div>
        <div class="th">Primary Goal</div>
        <div class="th">Submitted</div>
        <div class="th"></div>
      </div>
      <div id="tableBody"><div class="loading-state"><div class="spinner"></div><br>Loading submissions...</div></div>
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-name" id="modalName">—</div>
        <div class="modal-meta" id="modalMeta">—</div>
      </div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// 🔧 CHANGE THESE 3 VALUES — nothing else
// ════════════════════════════════════════════
var ADMIN_PASSWORD       = 'SUHANI9493';
var SUPABASE_URL         = 'https://orxujgqtltvhgllvpzai.supabase.co';
var SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yeHVqZ3F0bHR2aGdsbHZwemFpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjE0MjE0NywiZXhwIjoyMDkxNzE4MTQ3fQ.jgJEsk2PJ9T5uwhaz6FsnA_3U01KkkpmBIpzud92dn4';
// ════════════════════════════════════════════

var allData = [], filtered = [], PAGE_SIZE = 20, currentPage = 1;

function doLogin() {
  if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    sessionStorage.setItem('wcc_auth','1');
    loadData();
  } else {
    var e = document.getElementById('loginError');
    e.style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
    setTimeout(function(){ e.style.display = 'none'; }, 3000);
  }
}

function doLogout() {
  sessionStorage.removeItem('wcc_auth');
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

if (sessionStorage.getItem('wcc_auth') === '1') {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminPage').style.display = 'block';
  setTimeout(loadData, 100);
}

async function loadData() {
  document.getElementById('tableBody').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><br>Loading submissions...</div>';
  try {
    var res = await fetch(
      SUPABASE_URL + '/rest/v1/wellness_submissions?select=*&order=submitted_at.desc',
      { headers: { 'apikey': SUPABASE_SERVICE_KEY, 'Authorization': 'Bearer ' + SUPABASE_SERVICE_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allData = await res.json();
    computeStats();
    applyFilters();
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load data.<br><small>' + e.message + '</small></p></div>';
  }
}

function computeStats() {
  document.getElementById('statTotal').textContent = allData.length;
  var today = new Date().toDateString();
  document.getElementById('statToday').textContent =
    allData.filter(function(r){ return new Date(r.submitted_at).toDateString() === today; }).length;
  var weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  document.getElementById('statWeek').textContent =
    allData.filter(function(r){ return new Date(r.submitted_at) >= weekAgo; }).length;
  var goals = {};
  allData.forEach(function(r){ var g = r.primaryGoal||r.primary_goal||'—'; goals[g]=(goals[g]||0)+1; });
  var top = Object.keys(goals).sort(function(a,b){return goals[b]-goals[a]})[0]||'—';
  document.getElementById('statGoal').textContent = top === '—' ? '—' : top.split(' ')[0];
}

function applyFilters() {
  var s = document.getElementById('searchInput').value.toLowerCase();
  var gf = document.getElementById('goalFilter').value;
  var df = document.getElementById('dietFilter').value;
  filtered = allData.filter(function(r){
    if (s && ![(r.fullName||r.full_name||''), r.city||'', r.email||''].join(' ').toLowerCase().includes(s)) return false;
    if (gf && (r.primaryGoal||r.primary_goal||'') !== gf) return false;
    if (df && (r.dietType||r.diet_type||'') !== df) return false;
    return true;
  });
  currentPage = 1;
  renderTable();
}

function renderTable() {
  if (!filtered.length) {
    document.getElementById('tableBody').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📭</div><p>No submissions found.</p></div>';
    document.getElementById('resultsCount').textContent = '';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  var start = (currentPage-1)*PAGE_SIZE;
  var page = filtered.slice(start, start+PAGE_SIZE);
  var html = '';
  page.forEach(function(r, i) {
    var name = r.fullName||r.full_name||'—';
    var date = r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'}) : '—';
    html += '<div class="submission-row" onclick="openModal('+(start+i)+')">';
    html += '<div class="td td-name">'+esc(name)+'<br><small style="color:var(--muted);font-size:.75rem;font-weight:400">'+esc(r.email||'')+'</small></div>';
    html += '<div class="td"><span class="td-label">CITY: </span>'+esc(r.city||'—')+' · '+esc(String(r.age||'—'))+'</div>';
    html += '<div class="td"><span class="td-label">DIET: </span>'+esc(r.dietType||r.diet_type||'—')+'</div>';
    html += '<div class="td"><span class="td-label">GOAL: </span><span class="goal-pill">'+esc(r.primaryGoal||r.primary_goal||'—')+'</span></div>';
    html += '<div class="td"><span class="td-label">DATE: </span>'+date+'</div>';
    html += '<div class="td"><button class="view-btn" onclick="event.stopPropagation();openModal('+(start+i)+')">View</button></div>';
    html += '</div>';
  });
  document.getElementById('tableBody').innerHTML = html;
  document.getElementById('resultsCount').textContent =
    'Showing '+(start+1)+'–'+Math.min(start+PAGE_SIZE,filtered.length)+' of '+filtered.length+' submissions';
  renderPagination();
}

function renderPagination() {
  var total = Math.ceil(filtered.length/PAGE_SIZE);
  if (total <= 1) { document.getElementById('pagination').innerHTML=''; return; }
  var html = '<button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>← Prev</button>';
  for (var p=1;p<=total;p++) html += '<button class="page-btn '+(p===currentPage?'active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  html += '<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===total?'disabled':'')+'>Next →</button>';
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { currentPage=p; renderTable(); document.querySelector('.admin-body').scrollIntoView({behavior:'smooth'}); }

  document.getElementById('modalBody').innerHTML = html;

}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function exportCSV() {
  if (!filtered.length) return alert('No data to export.');
  var keys = Object.keys(filtered[0]).filter(function(k){ return k !== 'raw_data'; });
  var csv = keys.join(',') + '\n';
  filtered.forEach(function(r){
    csv += keys.map(function(k){ var v=r[k]==null?'':String(r[k]); return '"'+v.replace(/"/g,'""')+'"'; }).join(',') + '\n';
  });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'wellness_submissions_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
